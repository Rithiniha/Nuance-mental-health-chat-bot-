<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title -->
    <title>Nuance</title>

    <!-- Basic Meta -->
    <meta
      name="description"
      content="Nuance – a safe space for your mental wellness journey. Because feelings aren't binary."
    />
    <meta name="author" content="Nuance" />

    <!-- Favicon -->
    <!-- Place nuance.ico or nuance.png inside /public -->
    <link rel="icon" type="image/x-icon" href="/nuance.ico" />
    <!-- OR if using PNG -->
    <!-- <link rel="icon" type="image/png" href="/nuance.png" /> -->

    <!-- Open Graph (for sharing previews) -->
    <meta property="og:title" content="Nuance" />
    <meta
      property="og:description"
      content="Because feelings aren't binary."
    />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
